name: 'build gk'
description: 'Build GenomeKit conda package and save it under ~/conda-bld'
inputs:
  platform:
    description: 'platform name used in the mamba installer url'
    required: true
runs:
  using: "composite"
  steps:
    - name: get meta.yaml from conda-forge
      uses: ./.github/actions/curl-meta-yaml

    - name: try to restore the mamba env
      id: restore_mamba_cache
      uses: actions/cache/restore@v4
      with:
        key: mamba-env-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/run-tests.yaml', '.github/actions/**') }}
        path: |
          ~/micromamba
          ~/.condarc
          ~/bin/micromamba

    - name: try to restore the gk package tarballs
      id: restore_gk_pkg
      uses: actions/cache/restore@v4
      with:
        key: gk-tarballs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/run-tests.yaml', '.github/actions/**', 'conda-recipe/**', 'src/**', 'genome_kit/**', 'setup.py', 'setup/**', 'tests/**') }}
        path: |
          ~/conda-bld

      # skip remaining steps (except configure-conda) on cache hit

    - name: install mamba
      if: ${{ steps.restore_gk_pkg.outputs.cache-hit != 'true' }}
      uses: ./.github/actions/install-mamba
      with:
        installer-url: https://micro.mamba.pm/api/micromamba/${{ inputs.platform }}/1.5.8

    - name: create build env
      if: ${{ steps.restore_gk_pkg.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        set -eu
        if [[ "$RUNNER_OS" != "Windows" ]]; then
          source ${HOME}/.bash_profile 2>/dev/null || true
        fi
        # Determine env directory
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          ENV_DIR="$MAMBA_ROOT_PREFIX/envs/build"
        else
          ENV_DIR="${HOME}/micromamba/envs/build"
        fi
        set -x
        if [ ! -d "$ENV_DIR" ]; then
          # boa required for the mambabuild subcommand
          PKGS="boa==0.17.0 mamba==1.5.8 conda=24.5"
          if [[ "$RUNNER_OS" != "Windows" ]]; then
            PKGS="$PKGS ccache"
          fi
          micromamba create -yqn build -c conda-forge $PKGS
        fi
        set +x

    - if: ${{ steps.restore_mamba_cache.outputs.cache-hit != 'true' }}
      uses: ./.github/actions/configure-conda
      with:
        env: build

    - name: save mamba gk ccache
      if: ${{ steps.restore_gk_pkg.outputs.cache-hit != 'true' && runner.os != 'Windows' }}
      id: save_mamba_gk_ccache
      uses: actions/cache@v4
      with:
        key: gk-mamba-ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.head_ref || github.ref_name }}-${{ github.sha }}
        restore-keys: |
          gk-mamba-ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.head_ref || github.ref_name }}
          gk-mamba-ccache-${{ runner.os }}-${{ runner.arch }}-
        path: |
          ~/.ccache

    - name: set compiler cache size
      if: ${{ steps.restore_gk_pkg.outputs.cache-hit != 'true' && runner.os != 'Windows' }}
      shell: bash
      run: |
        source ${HOME}/.bash_profile 2>/dev/null || true
        set -x
        micromamba activate build
        ccache -M 100M
        mkdir -p ~/.ccache
        set +x

    - if: ${{ steps.restore_gk_pkg.outputs.cache-hit != 'true' }}
      name: build conda package
      shell: bash
      run: |
        set -eu
        if [[ "$RUNNER_OS" != "Windows" ]]; then
          source ${HOME}/.bash_profile 2>/dev/null || true
        fi
        set -x
        mkdir -p ~/conda-bld
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          micromamba run -n build conda mambabuild --croot ~/conda-bld -q --no-test conda-recipe
          micromamba run -n build conda build --croot ~/conda-bld purge
          micromamba run -n build conda clean -it
        else
          micromamba activate build
          conda mambabuild --croot ~/conda-bld -q --no-test conda-recipe
          conda build --croot ~/conda-bld purge
          conda clean -it
        fi

    - name: cache mamba env
      if: ${{ steps.restore_gk_pkg.outputs.cache-hit != 'true' }}
      id: save_mamba_cache
      uses: actions/cache/save@v4
      with:
        key: mamba-env-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/run-tests.yaml', '.github/actions/**') }}
        path: |
          ~/micromamba
          ~/.condarc
          ~/bin/micromamba

    - name: cache gk package tarballs
      if: ${{ steps.restore_gk_pkg.outputs.cache-hit != 'true' }}
      id: save_gk_pkg
      uses: actions/cache/save@v4
      with:
        key: gk-tarballs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/run-tests.yaml', '.github/actions/**', 'conda-recipe/**', 'src/**', 'genome_kit/**', 'setup.py', 'setup/**', 'tests/**') }}
        path: |
          ~/conda-bld
