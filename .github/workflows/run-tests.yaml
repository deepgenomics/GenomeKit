name: run-unit-tests
run-name: run unit tests
on:
  pull_request:
    paths:
    - ".github/actions/**"
    - ".github/workflows/**"
    - "conda-recipe/**"
    - "genome_kit/**"
    - "setup.py"
    - "setup/**"
    - "src/**"
    - "tests/**"


jobs:
  build:
    strategy:
      matrix:
        platform: ["linux-64", "osx-arm64", "osx-64"]
        include:
          - platform: "linux-64"
            runs-on: "ubuntu-latest"
          - platform: "osx-arm64"
            runs-on: "macos-latest"
          - platform: "osx-64"
            runs-on: "macos-26-intel"
    runs-on: ${{ matrix.runs-on }}
    if: "!startsWith(github.head_ref, 'release-please')"
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/build-gk
        with:
          platform: ${{ matrix.platform }}

  test:
    needs: build
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        platform: ["linux-64", "osx-arm64", "osx-64"]
        extras: ["none", "df"]
        rosetta: ["false"]
        include: # specify additional fields for all configs
          - python-version: "3.10"
            pyver-short: "310"
          - python-version: "3.11"
            pyver-short: "311"
          - python-version: "3.12"
            pyver-short: "312"
          - platform: "osx-arm64"
            runs-on: "macos-latest"
          - platform: "osx-64"
            runs-on: "macos-26-intel"
          - platform: "linux-64"
            runs-on: "ubuntu-latest"
          # single test for running intel build on arm64 macos runner with rosetta
          - python-version: "3.10"
            pyver-short: "310"
            platform: "osx-64" # intel build
            runs-on: "macos-latest" # defaults to arm64 runner with M1 chip
            extras: "df"
            rosetta: "true"
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: get meta.yaml from conda-forge for cache key calculation
        uses: ./.github/actions/curl-meta-yaml

      - name: restore mamba env
        id: restore_mamba_cache
        uses: actions/cache/restore@v4
        with:
          key: mamba-env-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/run-tests.yaml', '.github/actions/**') }}
          path: |
            ~/micromamba
            ~/.condarc
            ~/bin/micromamba
          fail-on-cache-miss: true

      - name: restore the gk package tarballs
        id: restore_gk_pkg
        uses: actions/cache/restore@v4
        with:
          key: gk-tarballs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/run-tests.yaml', '.github/actions/**', 'conda-recipe/**', 'src/**', 'genome_kit/**', 'setup.py', 'setup/**', 'tests/**') }}
          path: |
            ~/conda-bld
          fail-on-cache-miss: true

      - name: install mamba
        uses: ./.github/actions/install-mamba
        with:
          installer-url: https://micro.mamba.pm/api/micromamba/${{ matrix.platform }}/1.5.7

      - name: create test env
        shell: bash -l -e {0}
        run: |
          # boa required for the mambabuild subcommand
          set -x
          # inconsistently got "coverage 7.9.1 is not supported on this platform" so removed
          # (not needed?)
          if [ ! -d "${HOME}/micromamba/envs/test" ]; then
            micromamba create -yqn test -c conda-forge boa==0.16.0 mamba==1.5.7 conda==24.1.2
          fi
          set +x

      - name: run unittests
        id: run_unittests
        shell: bash -l -e {0}
        env:
          GK_EXTRAS: ${{ matrix.extras }}
          ROSETTA: ${{ matrix.rosetta }}
        run: |
          set -x
          micromamba activate test
          conda index ~/conda-bld
          files=(~/conda-bld/*/*py${{ matrix.pyver-short }}*.tar.bz2)
          if [ ! -e "${files[0]}" ]; then
              echo "No files matched for py${{ matrix.pyver-short }}"
              exit 1 
          fi
          extra_deps=(python=${{ matrix.python-version }})   
          # run command with optional extra deps
          if [ "$GK_EXTRAS" = "df" ]; then
            extra_deps+=("polars=1.39.3")
          fi
          if [ "$ROSETTA" = "true" ]; then
            extra_deps+=("polars-runtime-compat=1.39.3")
          fi
          conda mambabuild --croot /tmp/conda-bld -t "${files[@]}" --extra-deps "${extra_deps[@]}"
          conda clean -it
          set +x